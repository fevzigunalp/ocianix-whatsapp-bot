version: '3.9'

services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - '5432:5432'
    environment:
      POSTGRES_USER: wabot
      POSTGRES_PASSWORD: wabot_secret_2024
      POSTGRES_DB: wabot_platform
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U wabot']
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    command: redis-server --maxmemory 256mb --maxmemory-policy allkeys-lru
    volumes:
      - redisdata:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 10s
      timeout: 5s
      retries: 5

  minio:
    image: minio/minio:latest
    restart: unless-stopped
    ports:
      - '9000:9000'
      - '9001:9001'
    environment:
      MINIO_ROOT_USER: wabot_minio
      MINIO_ROOT_PASSWORD: wabot_minio_secret
    command: server /data --console-address ":9001"
    volumes:
      - miniodata:/data

  evolution-api:
    image: atendai/evolution-api:latest
    restart: unless-stopped
    ports:
      - '8080:8080'
    environment:
      SERVER_URL: http://localhost:8080
      AUTHENTICATION_API_KEY: evolution_api_key_2024
      DATABASE_ENABLED: 'true'
      DATABASE_PROVIDER: postgresql
      DATABASE_CONNECTION_URI: postgresql://wabot:wabot_secret_2024@postgres:5432/wabot_platform
      RABBITMQ_ENABLED: 'false'
      WEBSOCKET_ENABLED: 'true'
      REDIS_ENABLED: 'true'
      REDIS_URI: redis://redis:6379
      CACHE_REDIS_ENABLED: 'true'
      CACHE_REDIS_URI: redis://redis:6379
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  n8n:
    image: n8nio/n8n:latest
    restart: unless-stopped
    ports:
      - '5678:5678'
    environment:
      N8N_BASIC_AUTH_ACTIVE: 'true'
      N8N_BASIC_AUTH_USER: admin
      N8N_BASIC_AUTH_PASSWORD: n8n_secret_2024
      DB_TYPE: postgresdb
      DB_POSTGRESDB_HOST: postgres
      DB_POSTGRESDB_PORT: 5432
      DB_POSTGRESDB_DATABASE: wabot_platform
      DB_POSTGRESDB_USER: wabot
      DB_POSTGRESDB_PASSWORD: wabot_secret_2024
      WEBHOOK_URL: http://localhost:5678
    volumes:
      - n8ndata:/home/node/.n8n
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
  miniodata:
  n8ndata:
